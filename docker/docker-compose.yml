services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: digit-backend
    ports:
      - "8000:8000"
    volumes:
      # Persist database on host machine (data survives container restarts)
      - ../digit_recognizer.db:/app/digit_recognizer.db
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: digit-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
